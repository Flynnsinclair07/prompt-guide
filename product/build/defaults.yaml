## Pandoc defaults — Job Hunter's Bundle PDF build
## Used by build.sh; do not invoke pandoc directly.

from: markdown
to: pdf
pdf-engine: lualatex
template: eisvogel.latex

## Eisvogel + typography
variables:
  titlepage: true
  titlepage-color: "1a1a1a"
  titlepage-text-color: "ffffff"
  titlepage-rule-color: "ffffff"
  titlepage-rule-height: 2
  toc-own-page: true
  book: true
  classoption:
    - oneside
  geometry:
    - top=2.2cm
    - bottom=2.2cm
    - left=2.2cm
    - right=2.2cm
  fontsize: 11pt
  linestretch: 1.15
  ## TeX Gyre Heros = Helvetica metrics + full Unicode (arrows, checks, symbols).
  ## Ships with MacTeX. Avoids the Helvetica Neue missing-glyph issue.
  mainfont: "TeX Gyre Heros"
  sansfont: "TeX Gyre Heros"
  monofont: "Menlo"
  monofontoptions: "Scale=0.85"
  ## Code block styling — Eisvogel listings options for breakable code blocks
  listings-disable-line-numbers: true
  listings-no-page-break: true
  ## Glyph fallback for dingbats (✓ ✗) — TeX Gyre Heros covers arrows/Latin
  ## but lacks U+2713 / U+2717. Arial Unicode MS has both; route just those
  ## characters through it while keeping body in TeX Gyre Heros.
  ## Code-block line-wrapping — Pandoc emits raw \begin{verbatim} for un-
  ## tagged fenced code (no language hint), and verbatim cannot wrap. Switch
  ## to listings package globally so all code blocks (tagged or not) get
  ## breaklines + breakatwhitespace=false + columns=fullflexible.
  header-includes: |
    \usepackage{newunicodechar}
    \newfontfamily{\symbolfont}{Arial Unicode MS}
    \newunicodechar{✓}{{\symbolfont ✓}}
    \newunicodechar{✗}{{\symbolfont ✗}}
    \lstset{
      basicstyle=\ttfamily\small,
      breaklines=true,
      breakatwhitespace=true,
      breakindent=0pt,
      columns=fullflexible,
      keepspaces=true,
      showstringspaces=false,
      postbreak=\mbox{\textcolor{gray}{$\hookrightarrow$}\space}
    }

## Pandoc options
toc: true
toc-depth: 2
number-sections: false
highlight-style: tango
listings: true
standalone: true

## Metadata
metadata:
  title: "The Job Hunter's Bundle"
  subtitle: "44 Prompts · 8 Negotiation Scripts · 3 Worksheets"
  author: "Flynn Sinclair"
  lang: en-US
