## Pandoc defaults — Job Hunter's Bundle PDF build
## Used by build.sh; do not invoke pandoc directly.

from: markdown
to: pdf
pdf-engine: lualatex
template: eisvogel.latex

## Eisvogel + typography
variables:
  titlepage: true
  titlepage-color: "1a1a1a"
  titlepage-text-color: "ffffff"
  titlepage-rule-color: "ffffff"
  titlepage-rule-height: 2
  toc-own-page: true
  ## book: true — REMOVED. The book class forces section starts on recto
  ## (odd) pages, leaving 25 blank verso pages in a 141-page bundle even
  ## with classoption: oneside (Eisvogel ignores the override). This is
  ## a single document, not a multi-chapter book, so report class is fine.
  classoption:
    - oneside
  geometry:
    - top=2.2cm
    - bottom=2.2cm
    - left=2.2cm
    - right=2.2cm
  fontsize: 11pt
  linestretch: 1.15
  ## TeX Gyre Heros = Helvetica metrics + full Unicode (arrows, checks, symbols).
  ## Ships with MacTeX. Avoids the Helvetica Neue missing-glyph issue.
  mainfont: "TeX Gyre Heros"
  sansfont: "TeX Gyre Heros"
  monofont: "Menlo"
  monofontoptions: "Scale=0.85"
  ## Code block styling — Eisvogel listings options for breakable code blocks
  listings-disable-line-numbers: true
  ## listings-no-page-break: true — REMOVED. This wraps every lstlisting in
  ## a minipage (can't span pages), so any code block that doesn't fit on
  ## the current page gets pushed entirely to the next, leaving 25 blank
  ## verso-style pages in the bundle. Allow code blocks to break across
  ## pages — listings handles continuation cleanly with breaklines=true.
  ## Glyph fallback for dingbats (✓ ✗) — TeX Gyre Heros covers arrows/Latin
  ## but lacks U+2713 / U+2717. Arial Unicode MS has both; route just those
  ## characters through it while keeping body in TeX Gyre Heros.
  ## Code-block line-wrapping — Pandoc emits raw \begin{verbatim} for un-
  ## tagged fenced code (no language hint), and verbatim cannot wrap. Switch
  ## to listings package globally so all code blocks (tagged or not) get
  ## breaklines + breakatwhitespace=false + columns=fullflexible.
  header-includes: |
    \usepackage{newunicodechar}
    \newfontfamily{\symbolfont}{Arial Unicode MS}
    \newfontfamily{\emojifont}{Apple Color Emoji}[Renderer=HarfBuzz]
    \newunicodechar{✓}{{\symbolfont ✓}}
    \newunicodechar{✗}{{\symbolfont ✗}}
    \newunicodechar{🟢}{{\emojifont 🟢}}
    \newunicodechar{🟡}{{\emojifont 🟡}}
    \newunicodechar{🟠}{{\emojifont 🟠}}
    \newunicodechar{🔴}{{\emojifont 🔴}}
    \usepackage{fvextra}
    \DefineVerbatimEnvironment{verbatim}{Verbatim}{breaklines=true,breakanywhere=false,breakautoindent=true,fontsize=\small,frame=single,framesep=2mm,xleftmargin=4pt,formatcom=\color{black}}
    %% Drop listings entirely: its Unicode handling positions en-dash before
    %% adjacent digits ("2–3" → "–23") regardless of literate config. fancyvrb's
    %% Verbatim env handles UTF-8 cleanly via lualatex and supports breaklines
    %% for the original wrap fix. Pandoc emits raw \begin{verbatim} for
    %% untagged fenced code, which we redefine here to use fancyvrb's Verbatim.

## Pandoc options
toc: true
toc-depth: 2
number-sections: false
highlight-style: tango
listings: false
standalone: true

## Metadata
metadata:
  title: "The Job Hunter's Bundle"
  subtitle: "44 Prompts · 8 Negotiation Scripts · 3 Worksheets"
  author: "Flynn Sinclair"
  lang: en-US
